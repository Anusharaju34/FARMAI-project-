name: QA Automation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  flutter-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check code formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code static checks
        run: flutter analyze

      - name: Run unit & widget tests
        run: flutter test --coverage

      - name: Build Flutter Web (HTML Renderer)
        run: flutter build web --web-renderer html --release

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/
          retention-days: 1

      - name: Upload code coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/
          retention-days: 7

  selenium-web-e2e:
    needs: flutter-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable chromium-driver

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt || pip install selenium

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

      - name: Run local server for Flutter Web App
        run: |
          # Serve the compiled Flutter Web app on port 8085
          python3 -m http.server 8085 --directory build/web &
          sleep 5

      - name: Execute Selenium E2E Web Tests
        run: |
          # Execute the smoke login test
          python selenium_tests/selenium_login_test.py

      - name: Set up Node.js for Report Generation
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Node dependencies & Generate Appium Reports
        run: |
          cd appium-tests
          npm install
          npm run generate-report

      - name: Upload Excel & HTML Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: farmai-test-reports
          path: |
            reports/
            appium-tests/reports/
          retention-days: 14

  deploy-github-pages:
    needs: selenium-web-e2e
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Download Web Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
